<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passkey Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/passkey_login.css') }}">
</head>
<body>
    <div class="container">
        <a href="{{ url_for('main.index') }}" class="back-btn">← Back to options</a>
        <h1>Passkey Login</h1>
        <div class="method-badge">Passwordless Authentication</div>

        <div id="message"></div>

        <div class="info-box">
            <h3>How it works:</h3>
            <p>Enter your username and use your device's biometric (fingerprint, Face ID, etc.) to login</p>
            <p>No password needed!</p>
        </div>

        <form id="passkeyLoginForm">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <button type="submit" id="loginBtn">🔑 Login with Passkey</button>
        </form>

        <div class="divider">───── OR ─────</div>

        <div class="register-link">
            <p>Don't have a passkey?</p>
            <a href="{{ url_for('auth_passkey.passkey_register') }}">Register a new passkey →</a>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/passkey_login.js') }}"></script>
</body>
</html>
