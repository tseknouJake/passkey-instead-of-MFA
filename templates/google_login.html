<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/google_login.css') }}">
</head>
<body>
    <div class="container">
        <a href="{{ url_for('main.index') }}" class="back-btn">← Back to options</a>
        <h1>Google Login</h1>
        <div class="method-badge">Social Login</div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        {% if oauth_available %}
        <form action="{{ url_for('auth_social.login_google') }}" method="GET">
            <button type="submit">Continue with Google</button>
        </form>
        {% else %}
        <button type="button" class="disabled-btn" disabled>Google Login Unavailable</button>
        {% endif %}
    </div>
</body>
</html>
