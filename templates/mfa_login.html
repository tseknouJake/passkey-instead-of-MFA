<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFA Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mfa_login.css') }}">
</head>

<body>
    <div class="container">
        <a href="{{ url_for('main.index') }}" class="back-btn">← Back to options</a>
        <h1>MFA Login</h1>
        <div class="method-badge">Multi-Factor Authentication</div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Continue to MFA</button>
        </form>
        <div class="info">
            <ul>
                <div>Demo: username = "admin", password = "password123"</div>
                <div>or</div>
                <div>username: "jake", password = "jake1234"</div>
            </ul>
        </div>
    </div>
</body>
</html>
