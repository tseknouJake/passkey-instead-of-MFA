<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup MFA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/setup_mfa.css') }}">
</head>
<body>
    <div class="container">
        <h1>Setup Multi-Factor Authentication</h1>

        <div class="instructions">
            <strong>Step 1:</strong> Download an authenticator app (Google Authenticator, Authy, or Microsoft Authenticator)<br>
            <strong>Step 2:</strong> Scan the QR code below or enter the secret key manually<br>
            <strong>Step 3:</strong> Click "Continue" to verify your setup
        </div>

        <div class="qr-container">
            <img src="data:image/png;base64,{{ qr_code }}" alt="MFA QR Code" class="qr-code">
        </div>

        <div class="secret">
            <div style="margin-bottom: 10px; color: #666;">Manual Entry Key:</div>
            <div class="secret-code">{{ secret }}</div>
        </div>

        <form action="{{ url_for('auth_otp.verify_mfa') }}" method="GET">
            <button type="submit">Continue to Verification</button>
        </form>
    </div>
</body>
</html>
