<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Authentication</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
        }
        h1 { text-align: center; color: #333; margin-bottom: 15px; font-size: 36px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 50px; font-size: 18px; }
        .auth-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        .auth-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .auth-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .auth-card.mfa { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }
        .auth-card.passkey { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); }
        .auth-icon { font-size: 72px; margin-bottom: 20px; }
        .auth-card h2 { color: #333; margin-bottom: 15px; font-size: 28px; }
        .auth-card p { color: #555; line-height: 1.6; margin-bottom: 20px; }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn:hover { background: #555; }
        .skip-link { text-align: center; margin-top: 30px; }
        .skip-link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .skip-link a:hover { text-decoration: underline; }
        @media (max-width: 768px) {
            .auth-options { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Account Created!</h1>
        <p class="subtitle">Welcome, <strong>{{ username }}</strong>! Choose how you want to secure your account</p>

        <div class="auth-options">
            <div class="auth-card mfa" data-url="{{ url_for('auth_otp.setup_mfa') }}">
                <div class="auth-icon">📱</div>
                <h2>Setup MFA</h2>
                <p>Use an authenticator app for two-factor authentication</p>
                <a href="{{ url_for('auth_otp.setup_mfa') }}" class="btn">Setup MFA</a>
            </div>

            <div class="auth-card passkey" data-url="{{ url_for('auth_passkey.passkey_register') }}">
                <div class="auth-icon">🔑</div>
                <h2>Register Passkey</h2>
                <p>Use your fingerprint or Face ID for passwordless login</p>
                <a href="{{ url_for('auth_passkey.passkey_register') }}" class="btn">Register Passkey</a>
            </div>
        </div>

        <div class="skip-link">
            <a href="{{ url_for('main.logout') }}">Skip for now, I'll set this up later</a>
        </div>
    </div>

    <script>
        // Add click handlers to cards (no inline onclick)
        document.querySelectorAll('.auth-card').forEach(card => {
            card.addEventListener('click', function(e) {
                // Don't trigger if clicking the link directly
                if (e.target.tagName !== 'A') {
                    window.location.href = this.dataset.url;
                }
            });
        });
    </script>
</body>
</html>
