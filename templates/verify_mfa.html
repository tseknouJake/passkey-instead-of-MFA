<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify MFA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/verify_mfa.css') }}">
</head>
<body>
    <div class="container">
        <h1>Enter MFA Code</h1>

        <div class="info">
            Enter the 6-digit code from your authenticator app
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="token">Authentication Code</label>
                <input type="text" id="token" name="token" maxlength="6" pattern="[0-9]{6}" required autofocus>
            </div>
            <button type="submit">Verify</button>
        </form>
    </div>
</body>
</html>
