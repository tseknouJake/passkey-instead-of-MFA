<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
</head>
<body>
    <div class="container">
        <a href="{{ url_for('main.index') }}" class="back-btn">← Back to home</a>
        <h1>Create Account</h1>
        <p class="subtitle">Register to get started with secure authentication</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required
                            value="{{ username or '' }}"
                            {% if username_readonly %}readonly style="background-color: #e9e9e9; cursor: not-allowed;"{% endif %}>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="8">
                <div class="password-hint">Minimum 8 characters</div>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="8">
            </div>

            <button type="submit">Create Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="{{ url_for('auth_classic.password_login') }}">Login</a>
        </div>
    </div>
</body>
</html>
